<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMEM PANEL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      body { margin: 0; background: #0f172a; color: #f8fafc; }
      #initial-loader {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #0f172a; z-index: 9999; flex-direction: column; gap: 1rem;
      }
      .loader-logo {
        font-size: 3rem; font-weight: bold; font-family: 'Inter', sans-serif;
        color: transparent; -webkit-text-stroke: 2px #3b82f6; text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        animation: pulseLogo 2s infinite;
      }
      @keyframes pulseLogo {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; text-shadow: 0 0 30px rgba(59, 130, 246, 0.8); }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-logo">E</div>
    </div>
    <div id="root"></div>
    <script type="module">
      import '/src/main.tsx';
      window.onload = () => {
        const loader = document.getElementById('initial-loader');
        if (loader) loader.style.display = 'none';
      };
    </script>
  </body>
</html>
